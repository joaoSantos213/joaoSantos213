name: Metrics
on:
  # Atualiza automaticamente a cada 12 horas
  schedule: [{cron: "0 */12 * * *"}]
  # Permite correr manualmente a partir do separador Actions
  workflow_dispatch:
  # Executa sempre que é feito um push na branch principal
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # É necessário gerar um Personal Access Token (PAT) com escopo de repo e user e guardá-lo nos Secrets como METRICS_TOKEN
          token: ${{ secrets.METRICS_TOKEN }}

          # Configurações básicas
          user: joaoSantos213
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Lisbon
          filename: github-metrics.svg

          # Plugin de Linguagens (Mostra as linguagens mais usadas nos teus repositórios)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # Plugin de Hábitos (Mostra os teus horários e dias mais produtivos de commit)
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # Plugin de Linhas de Código (Opcional, conta as linhas totais adicionadas/removidas)
          plugin_lines: yes
